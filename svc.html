<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>S vs C</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000000;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .top-button {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      backdrop-filter: blur(6px);
      transition: all 0.2s ease;
    }

    .top-button:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    .controls {
      margin-bottom: 15px;
    }

    .btn {
      padding: 10px 20px;
      margin: 0 5px;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.2);
    }

    .game-box {
      width: min(75vw, 700px);
      aspect-ratio: 4 / 3;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <a href="index.html" class="top-button">Domů</a>

  <div class="controls">
    <button class="btn" onclick="startGame()">Hrát</button>
    <button class="btn" onclick="stopGame()">Konec</button>
  </div>

  <div class="game-box">
    <iframe id="gameFrame"></iframe>
  </div>

  <script>
    function startGame() {
      document.getElementById('gameFrame').src = 'Bez, oli, bez.html';
    }

    function stopGame() {
      document.getElementById('gameFrame').src = '';
    }
  </script>

</body>
</html>
