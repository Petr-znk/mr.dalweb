<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>mr.dal web</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000000;
      font-family: Arial, sans-serif;
    }

    /* tlačítko vpravo nahoře */
    .top-button {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      backdrop-filter: blur(6px);
      transition: all 0.2s ease;
    }

    .top-button:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    img {
      width: 500px;
    }
  </style>
</head>
<body>

  <a href="svc.html" class="top-button">S vs C</a>

  <img src="logo.png" alt="logo">

</body>
</html>
